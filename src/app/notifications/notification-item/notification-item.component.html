<div class="notification-container">
  <button class="notification-msg-btn" (click)="open()">
    <div class="notif-left">
      <div class="notif-message" [class.unread]="notification.readAt === null">
        {{ notification.message }}
      </div>

      <div class="notif-time">
        {{ creationDate }}
      </div>
    </div>
  </button>

  <button
    class="options-btn"
    mat-icon-button
    (click)="$event.stopPropagation()"
    #actionsTrigger="matMenuTrigger"
    [matMenuTriggerFor]="notifActions"
  >
    <mat-icon>more_vert</mat-icon>
  </button>
  <mat-menu #notifActions hasBackdrop="false">
    <button
      mat-menu-item
      matMenuClose
      (click)="$event.stopPropagation(); actionsTrigger.closeMenu(); markAsRead()"
    >
      <mat-icon>done</mat-icon>
      <span>Mark as read</span>
    </button>

    <button mat-menu-item (click)="$event.stopPropagation(); actionsTrigger.closeMenu(); hide()">
      <mat-icon>delete</mat-icon>
      <span>Remove</span>
    </button>
  </mat-menu>
</div>
