<div class="cart-page page-boundaries">
  <h1>Viewing your cart</h1>

  @if (cartItems.length === 0) {
    <p class="empty-message">Your cart is empty. Why don't you do some shopping?</p>
  } @else {
    <div class="cart-layout">
      <!-- LEFT: Cart Items -->
      <div class="cart-items-section">
        <app-cart-item-card-list
          [cartItems]="cartItems"
          [showDelete]="true"
          (removeItem)="removeCartItem($event)"
        ></app-cart-item-card-list>

        <div class="cart-items-header">
          <button class="btn btn-outline" (click)="clearCart()">
            <span class="material-icons">delete</span>
            Clear Cart
          </button>
        </div>
      </div>

      <!-- RIGHT: Summary -->
      <div class="cart-summary">
        <h2>Cart Summary</h2>

        <div class="summary-row">
          <span>Items:</span>
          <span>{{ cartItems.length }}</span>
        </div>

        <div class="summary-row total">
          <span>Total:</span>
          <span>{{ totalPrice | currency }}</span>
        </div>

        <button class="btn btn-filled checkout-btn" (click)="navigateCheckout()">
          <span class="material-icons">shopping_cart_checkout</span>
          Proceed to checkout
        </button>
      </div>
    </div>
  }
</div>
