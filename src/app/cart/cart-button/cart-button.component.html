@if (!guest) {
  <button matIconButton matTooltip="View cart" (click)="navigateCart()">
    <mat-icon
      [matBadge]="cartItemCount"
      [matBadgeHidden]="cartItemCount === 0"
      matBadgeColor="accent"
    >
      shopping_cart
    </mat-icon>
  </button>
} @else {
  <button class="guest-btn" (click)="navigateCart()">
    <span>View Cart</span>
    &nbsp;
    @if (cartItemCount > 0) {
      <span>({{ cartItemCount }})</span>
    }
  </button>
}
