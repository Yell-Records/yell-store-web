<header class="top-header">
  <div class="banner-img left" [class.checkout-size]="isAtCheckout()">
    <img
      src="assets/main_banner.png"
      [routerLink]="['/home']"
      alt="Quantum Mart Logo"
      draggable="false"
    />
  </div>

  @if (showNavTabs()) {
    <div>
      <nav class="nav-tabs center">
        <a routerLink="/home" routerLinkActive="active">Home</a>
        <a routerLink="/about-us" routerLinkActive="active">About Us</a>
      </nav>
    </div>
  }

  <div class="right">
    @if (user === null) {
      <!-- Guest information group -->
      <div class="guest-actions">
        @if (!isAtCart()) {
          <app-cart-button [guest]="true"></app-cart-button>
        }
      </div>
    }
  </div>
</header>
