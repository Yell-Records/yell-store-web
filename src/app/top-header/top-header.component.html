<header class="top-header">
  <div class="banner-img left">
    <img
      src="assets/yell-records-banner.png"
      [routerLink]="['/']"
      alt="Yell Records Logo"
      draggable="false"
    />
  </div>

  @if (showNavTabs()) {
    <div>
      <nav class="nav-tabs center">
        <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
          Home
        </a>
        <a routerLink="/about-us" routerLinkActive="active">About Us</a>

        @if (showArtistsTab()) {
          <a routerLink="/artists" routerLinkActive="active">Artists</a>
        }
      </nav>
    </div>
  }

  <div class="right" [class.mobile-admin-actions]="user !== null">
    @if (user === null) {
      <!-- Guest information group -->
      <div class="view-cart-btn">
        @if (showViewCart()) {
          <app-cart-button [guest]="true"></app-cart-button>
        }
      </div>
    } @else {
      <!-- Admin actions -->
      <div class="admin-actions">
        <span class="username">Administrator Access</span>

        <button matIconButton (click)="navigateAdminDash()" matTooltip="Admin Dashboard">
          <mat-icon>admin_panel_settings</mat-icon>
        </button>

        <button matIconButton [matMenuTriggerFor]="adminOptions">
          <mat-icon>more_vert</mat-icon>
        </button>
        <mat-menu #adminOptions>
          <button mat-menu-item (click)="navigateUserSettings()">
            <mat-icon>account_circle</mat-icon>
            <span>Account Settings</span>
          </button>

          <button mat-menu-item (click)="appLogout()">
            <mat-icon>logout</mat-icon>
            <span>Logout</span>
          </button>
        </mat-menu>
      </div>
    }
  </div>
</header>

<!-- Mobile "view cart" button -->
@if (showViewCart() && user === null) {
  <button
    matFab
    [matBadge]="cartItemCount()"
    [matBadgeHidden]="cartItemCount() === 0"
    class="mobile-cart-button"
    (click)="navigateCart()"
  >
    <mat-icon>shopping_cart</mat-icon>
  </button>
}
