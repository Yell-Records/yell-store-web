@if (categories.length > 0) {
  <ul class="categories">
    <h3 class="categories__title">Categories</h3>

    <div class="category-list">
      @for (category of categories; track $index) {
        <li class="category">
          <button class="category__link" (click)="applyCategoryParam(category.slug)">
            {{ category.name }}
          </button>
        </li>
      }
    </div>
  </ul>
}
