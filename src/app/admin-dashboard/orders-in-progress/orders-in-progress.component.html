<div>
  <h1>In-Progress Orders</h1>

  @if (loading()) {
    <mat-spinner></mat-spinner>
  } @else {
    <app-orders-list [orders]="unfinishedOrders"></app-orders-list>

    @if (unfinishedOrders.length > 5) {
      <mat-paginator
        [length]="orderPaginator.length"
        [pageIndex]="orderPaginator.pageIndex"
        [pageSize]="orderPaginator.pageSize"
        [pageSizeOptions]="[5, 10]"
        (page)="orderPaginator.onPage($event)"
      >
      </mat-paginator>
    }
  }
</div>
