name: Create Release

permissions:
  contents: write
  issues: write

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - minor
          - patch

jobs:
  release:
    name: Create new ${{ github.event.inputs.bump }} release
    outputs:
      version: ${{ steps.newTag.outputs.version }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
      - name: Construct new version name
        id: newTag
        run: |
          git fetch --tags
          latest=$(git tag --sort=version:refname | tail -n 1)
          currVersion="${latest#v}"
          currVersion="${currVersion%%-*}"
          major=$(echo "$currVersion" | cut -d. -f1)
          minor=$(echo "$currVersion" | cut -d. -f2)
          patch=$(echo "$currVersion" | cut -d. -f3)
          case "${{ github.event.inputs.bump }}" in
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
          esac
          suffix=""
          if [ "$major" -lt 1 ]; then
            suffix="-alpha"
          fi
          newVersion="${major}.${minor}.${patch}${suffix}"
          echo "version=$newVersion" >> $GITHUB_OUTPUT
          if [ "$suffix" = "-alpha" ]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi
      - name: Build asset
        run: |
          npm ci
          npm install @angular/cli
          npx ng build --configuration=production
      - name: Bundle angular browser build
        run: |
          cd dist/YellStoreWeb/browser
          zip -r ../../../YellStoreWeb-v${{ steps.newTag.outputs.version }}.zip .
      - name: Download latest backend release asset
        id: backend
        run: |
          # Fetch latest backend release metadata
          latest_backend_tag=$(gh release list \
            --repo Yell-Records/yell-store-services \
            --limit 1 \
            --json tagName \
            --jq '.[0].tagName')

          echo "Latest backend tag: $latest_backend_tag"

          # Fetch asset name
          asset_name=$(gh release view "$latest_backend_tag" \
            --repo Yell-Records/yell-store-services \
            --json assets \
            --jq '.assets[0].name')

          echo "Backend asset: $asset_name"

          # Download the asset
          gh release download "$latest_backend_tag" \
            --repo Yell-Records/yell-store-services \
            --pattern "$asset_name"

          echo "asset_name=$asset_name" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload new release
        run: |
          gh release create v${{ steps.newTag.outputs.version }} \
            --generate-notes \
            --prerelease=${{ steps.newTag.outputs.prerelease }} \
            YellStoreWeb-v${{ steps.newTag.outputs.version }}.zip \
            "${{ steps.backend.outputs.asset_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  label:
    name: Add release label to issues
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Create new label "released:v${{ needs.release.outputs.version }}"
        id: newLabel
        run: |
          label="released:v${{ needs.release.outputs.version }}"

          gh label create "$label" \
            --color "#a9a68d" \
            --description "Issues fixed in version ${{ needs.release.outputs.version }}" \
            || echo "Label already exists"

          echo "label=$label" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Attach label to closed issues
        run: |
          version=${{ needs.release.outputs.version }}

          # Get previous tag
          prev=$(gh release list --limit 2 --json tagName --jq '.[1].tagName')

          # Get previous release date
          prev_date=$(gh release view "$prev" --json publishedAt --jq '.publishedAt')
          curr_date=$(gh release view "v$version" --json publishedAt --jq '.publishedAt')

          # Fetch closed issues and filter by timestamp window
          issues=$(gh api repos/$GITHUB_REPOSITORY/issues \
            --method GET \
            --paginate \
            -F state=closed \
            -q '.[] 
              | select(.closed_at != null) 
              | select(.closed_at > "'"$prev_date"'" and .closed_at <= "'"$curr_date"'") 
              | .number')

          for issue in $issues; do
            echo "Labeling issue #$issue"
            gh issue edit "$issue" --add-label "${{ steps.newLabel.outputs.label }}"
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
